<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#667eea">
<meta charset="UTF-8">
<title>Mes Objectifs</title>
	
<style>
body {font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; justify-content: center; align-items: center;
  height: 100vh; margin: 0; }
.app {
  background: white;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  max-width: 420px;   /* limite sur grand écran */
  margin: 20px auto;  /* centrer sur desktop */
  padding: 30px;
  width: 90%;         /* largeur relative pour desktop et tablettes */
  min-height: 80vh;   /* prend presque toute la hauteur de l'écran */
}
h1 {text-align: center; margin-bottom: 20px; }
.card {display: flex; flex-direction: column; gap: 16px; }
input, select {padding: 14px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; }
button {padding: 14px; border-radius: 12px; border: none; background: #667eea; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
button:hover {background: #5a67d8; }
ul {list-style: none; padding: 0; margin-top: 20px; max-height: 300px; overflow-y: auto; }
li {background: #f7f8fc; padding: 16px; border-radius: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
.left {display: flex; align-items: center; gap: 10px; }
.done {text-decoration: line-through; opacity: 0.6;}
.delete {background: #ff4d4d; padding: 5px 8px; border-radius: 8px; font-size: 12px; }
@media (max-width: 360px) {
  .app {
    width: 100%;     
    height: 100vh;    
    border-radius: 0;  
    margin: 0;
    padding: 20px;
  }
  h1 { font-size: 2rem; }
  input, select, button { font-size: 18px; padding: 16px; }
  li { font-size: 18px; padding: 18px; }
}
</style>

</head>

<body>
 <div class="app">
  	<h1>Mes Objectifs</h1>
  	<input type="text" id="objectifInput" placeholder="Nouvel objectif">
    <input type="number" id="intervalInput" min="1" value="1">
    <select id="unitInput">
      <option value="days">Jour(s)</option>
      <option value="weeks">Semaine(s)</option>
    </select>
    <button onclick="ajouterObjectif()">Ajouter</button>

  <ul id="listeObjectifs"></ul>
</div>

<script>
// -------------------------
// VARIABLES
// -------------------------
const input = document.getElementById("objectifInput");
const intervalInput = document.getElementById("intervalInput");
const unitInput = document.getElementById("unitInput");
const liste = document.getElementById("listeObjectifs");

let objectifs = JSON.parse(localStorage.getItem("objectifs")) || [];

// -------------------------
// UTILITAIRES
// -------------------------
function sauvegarder() {
  localStorage.setItem("objectifs", JSON.stringify(objectifs));
}

function creerNouvellePeriode(obj) {
  const maintenant = new Date();
  obj.periodStart = maintenant.toISOString();

  let intervalEnJours = obj.interval;
  if (obj.unit === "weeks") intervalEnJours *= 7;

  const fin = new Date(maintenant);
  fin.setDate(fin.getDate() + intervalEnJours);
  obj.periodEnd = fin.toISOString();

  obj.done = false;
}

function joursRestants(obj) {
  const maintenant = new Date();
  const fin = new Date(obj.periodEnd);
  const diff = fin - maintenant;
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function getAlerte(obj) {
  const restant = joursRestants(obj);
  if (restant <= 0) return "⚠ En retard !";
  if (restant === 1) return "Dernier jour !";
  if (restant <= 2) return "🟠 Presque fini !";
  return `Il reste ${restant} jour(s)`;
}

// -------------------------
// GESTION OBJECTIFS
// -------------------------
function ajouterObjectif() {
  if (input.value.trim() === "") return;

  const interval = parseInt(intervalInput.value);
  const unit = unitInput.value;

  const obj = {
    nom: input.value,
    interval: interval,
    unit: unit
  };

  creerNouvellePeriode(obj);

  objectifs.push(obj);

  input.value = "";
  sauvegarder();
  afficherObjectifs();
}

function supprimerObjectif(index) {
  objectifs.splice(index, 1);
  sauvegarder();
  afficherObjectifs();
}

function toggleDone(index) {
  const obj = objectifs[index];
  obj.done = !obj.done;
  sauvegarder();
  afficherObjectifs();
}

// -------------------------
// AFFICHAGE
// -------------------------
function afficherObjectifs() {
  liste.innerHTML = "";

  objectifs.forEach((obj, index) => {
    const li = document.createElement("li");

    li.innerHTML = `
      <div class="left">
        <input type="checkbox" ${obj.done ? "checked" : ""} onchange="toggleDone(${index})">
        <span class="${obj.done ? "done" : ""}">
          ${obj.nom} - <strong>${obj.interval} ${obj.unit}</strong>
          <br>
          <small>${getAlerte(obj)}</small>
        </span>
      </div>
      <button class="delete" onclick="supprimerObjectif(${index})">X</button>
    `;

    liste.appendChild(li);
  });
}

// -------------------------
// GESTION DES PÉRIODES
// -------------------------
function verifierPeriodes() {
  const maintenant = new Date();

  objectifs.forEach(obj => {
    const fin = new Date(obj.periodEnd);
    if (maintenant > fin) {
      creerNouvellePeriode(obj);
    }
  });

  sauvegarder();
  afficherObjectifs();
}

// -------------------------
// INITIALISATION
// -------------------------
window.addEventListener("load", () => {
  verifierPeriodes();
  afficherObjectifs();
  // Vérifie toutes les 10 minutes
  setInterval(verifierPeriodes, 10 * 60 * 1000);
});
	
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("Service Worker enregistré"))
    .catch(err => console.log("Erreur SW:", err));
}
</script>
  
</body>
