<!DOCTYPE html>
<html lang="fr">
<head>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<meta name="viewport" content="#121212, user-scalable=no">
<meta charset="UTF-8">
<title>Mes Objectifs</title>
	
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.app {
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 420px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.card {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

input, select {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}

button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #667eea;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #5a67d8;
}

ul {
  list-style: none;
  padding: 0;
  margin-top: 20px;
}

li {
  background: #f7f8fc;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.done {
  text-decoration: line-through;
  opacity: 0.6;
}

.delete {
  background: #ff4d4d;
  padding: 5px 8px;
  border-radius: 8px;
  font-size: 12px;
}
</style>

</head>

<body>
  <div class="app">
    <h1>🎯 Objectifs Tracker</h1>

    <div class="card">
      <input type="text" id="objectifInput" placeholder="Nouvel objectif...">

      <select id="frequenceInput">
        <option value="Tous les jours">Tous les jours</option>
        <option value="3x/semaine">3x par semaine</option>
        <option value="1x/semaine">1x par semaine</option>
        <option value="1x/mois">1x par mois</option>
      </select>

      <button id="addBtn">Ajouter</button>
    </div>

    <ul id="listeObjectifs"></ul>
  </div>

<script>
const input = document.getElementById("objectifInput");
const frequenceInput = document.getElementById("frequenceInput");
const liste = document.getElementById("listeObjectifs");
const addBtn = document.getElementById("addBtn");

let objectifs = JSON.parse(localStorage.getItem("objectifs")) || [];

function sauvegarder() {
  localStorage.setItem("objectifs", JSON.stringify(objectifs));
}

function obtenirCleReset(frequence) {
  const now = new Date();

  if (frequence === "Tous les jours") {
    return now.toISOString().split("T")[0]; // 2026-03-02
  }

  if (frequence === "3x/semaine" || frequence === "1x/semaine") {
    const year = now.getFullYear();
    const week = Math.ceil(
      ((now - new Date(year, 0, 1)) / 86400000 + new Date(year, 0, 1).getDay() + 1) / 7
    );
    return `${year}-W${week}`;
  }

  if (frequence === "1x/mois") {
    return `${now.getFullYear()}-${now.getMonth()}`;
  }
}

function verifierReset() {
  objectifs.forEach(obj => {
    const resetActuel = obtenirCleReset(obj.frequence);

    if (obj.lastReset !== resetActuel) {
      obj.done = false;
      obj.lastReset = resetActuel;
    }
  });

  sauvegarder();
}

function afficherObjectifs() {
  liste.innerHTML = "";

  objectifs.forEach((obj, index) => {
    const li = document.createElement("li");

    li.innerHTML = `
      <div class="left">
        <input type="checkbox" ${obj.done ? "checked" : ""} onchange="toggleDone(${index})">
        <span class="${obj.done ? "done" : ""}">
          ${obj.nom} - <strong>${obj.frequence}</strong>
        </span>
      </div>
      <button class="delete" onclick="supprimerObjectif(${index})">X</button>
    `;

    liste.appendChild(li);
  });
}

function ajouterObjectif() {
  if (input.value.trim() === "") return;

  objectifs.push({
    nom: input.value,
    frequence: frequenceInput.value,
    done: false,
    lastReset: obtenirCleReset(frequenceInput.value)
  });

  input.value = "";
  sauvegarder();
  afficherObjectifs();
}

function supprimerObjectif(index) {
  objectifs.splice(index, 1);
  sauvegarder();
  afficherObjectifs();
}

function toggleDone(index) {
  objectifs[index].done = !objectifs[index].done;
  sauvegarder();
  afficherObjectifs();
}

addBtn.addEventListener("click", ajouterObjectif);

verifierReset();
afficherObjectifs();
</script>
  
</body>
